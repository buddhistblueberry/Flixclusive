name: Debug Build

on:
  workflow_dispatch:

permissions:
  contents: write
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "TMDB_API_KEY=a3c807a11279035d3214453354ae70f2" >> local.properties
          echo "GITHUB_TOKEN=${{ secrets.CRASH_REPORT_TOKEN }}" >> local.properties

      - name: Assemble debug APK
        run: ./gradlew :app-mobile:assembleDebug --stacktrace --info

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app-mobile/build/outputs/apk/debug/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-${{ github.run_number }}
          name: "Debug Build ${{ github.run_number }}"
          body: |
            ## Debug Build ${{ github.run_number }}
            
            ### What's included:
            - ✅ Pre-configured TMDB API key
            - ✅ English-only + arm64-only (smaller APK)
            - ✅ Bug fixes for crash issues
            - ✅ Debug logging enabled
            
            ### Installation:
            1. Download `flixclusive-debug.apk` below
            2. Enable "Install from unknown sources"
            3. Open and install
          files: app-mobile/build/outputs/apk/debug/*.apk
          make_latest: false
